<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-container">
    <!-- Logo -->
    <a href="#hero" class="nav-logo" (click)="closeMenu()">
      <span class="logo-bracket">&lt;</span>Mickael<span class="logo-bracket">/&gt;</span>
    </a>

    <!-- Desktop links -->
    <ul class="nav-links">
      @for (link of links; track link.href) {
        <li><a [href]="link.href">{{ link.label }}</a></li>
      }
    </ul>

    <!-- Actions -->
    <div class="nav-actions">
      <button class="theme-toggle" (click)="toggleTheme()" [title]="isDark() ? 'Mode clair' : 'Mode sombre'">
        @if (isDark()) {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>

      <a href="assets/cv.pdf" download class="btn btn-primary btn-sm">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        CV
      </a>

      <!-- Hamburger -->
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" [class.open]="menuOpen()">
    @for (link of links; track link.href) {
      <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
    }
  </div>
</nav>
