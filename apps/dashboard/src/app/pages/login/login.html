<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Administration Portfolio</mat-card-title>
      <mat-card-subtitle>Connectez-vous pour continuer</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" />
          <mat-icon matSuffix>email</mat-icon>
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput formControlName="password" type="password" />
          <mat-icon matSuffix>lock</mat-icon>
        </mat-form-field>
        @if (error) {
          <p class="error-msg">{{ error }}</p>
        }
        <button mat-flat-button color="primary" type="submit" [disabled]="loading" class="full-width">
          {{ loading ? 'Connexion...' : 'Se connecter' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
