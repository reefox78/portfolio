<div class="page">
  <div class="page-header">
    <h1>Skills</h1>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon> Nouvelle skill
    </button>
  </div>

  @if (showForm) {
    <mat-card class="form-card">
      <mat-card-title>{{ editingId ? 'Modifier' : 'Nouvelle' }} skill</mat-card-title>
      <mat-card-content>
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="form-row">
            <mat-form-field appearance="outline" class="flex-1">
              <mat-label>Nom</mat-label>
              <input matInput formControlName="name" />
            </mat-form-field>
            <mat-form-field appearance="outline" class="flex-1">
              <mat-label>Catégorie</mat-label>
              <mat-select formControlName="category">
                <mat-option value="Frontend">Frontend</mat-option>
                <mat-option value="Backend">Backend</mat-option>
                <mat-option value="DevOps">DevOps</mat-option>
                <mat-option value="Mobile">Mobile</mat-option>
                <mat-option value="Autre">Autre</mat-option>
              </mat-select>
            </mat-form-field>
            <mat-form-field appearance="outline" style="width:100px">
              <mat-label>Niveau (1-5)</mat-label>
              <input matInput formControlName="level" type="number" min="1" max="5" />
            </mat-form-field>
            <mat-form-field appearance="outline" style="width:80px">
              <mat-label>Ordre</mat-label>
              <input matInput formControlName="order" type="number" />
            </mat-form-field>
          </div>
          <div class="form-actions">
            <button mat-button type="button" (click)="showForm = false">Annuler</button>
            <button mat-flat-button color="primary" type="submit">Enregistrer</button>
          </div>
        </form>
      </mat-card-content>
    </mat-card>
  }

  <mat-card>
    <table mat-table [dataSource]="skills()" class="full-width">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nom</th>
        <td mat-cell *matCellDef="let s">{{ s.name }}</td>
      </ng-container>
      <ng-container matColumnDef="category">
        <th mat-header-cell *matHeaderCellDef>Catégorie</th>
        <td mat-cell *matCellDef="let s">{{ s.category }}</td>
      </ng-container>
      <ng-container matColumnDef="level">
        <th mat-header-cell *matHeaderCellDef>Niveau</th>
        <td mat-cell *matCellDef="let s" class="stars">{{ stars(s.level) }}</td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button (click)="openEdit(s)"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" (click)="delete(s.id)"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
